kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: local-dev
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry.localhost:5001"]
      endpoint = ["https://kind-registry:5000"]
    [plugins."io.containerd.grpc.v1.cri".registry.configs."registry.localhost:5001".tls]
      ca_file = "/etc/containerd/certs.d/registry-localhost-5001/ca.crt"
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        listenAddress: "127.0.0.1"
        protocol: TCP
    extraMounts:
      - hostPath: ./certs/domain.crt
        containerPath: /etc/containerd/certs.d/registry-localhost-5001/ca.crt